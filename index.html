<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/index.css">
    <title>Dollars Per Gallon Visualizer</title>
</head>
<body>
    <div class="meter-container">
        <div class="car-image-container">
            <br><br> <!-- Keep everything aligned -->
            <img src="./images/getting-gas.png" alt="It's a drawing of someone getting gas-meter-canvas"
                width="200"
                height="200">
        </div>
        <div style="text-align: center;">
            <h2>The Tank</h2>
            <canvas id="gas-meter-canvas"></canvas>
        </div>
    </div>
    <div class="fill-data-container" style="display: inline-block;">
        <button type="button" onclick="fill()" id="fill">Fill</button>
        <button type="button" onclick="stop()" id="stop-restart">Stop</button>
        <!-- <button type="button" onclick="clearScreen()">Clear</button> -->
        <br>
        <p id="error" style="color: red"></p>
        <p>Enter the Price per Gallon:</p>
        <label for="user-input">$</label>
        <input type="text" placeholder="0.00" id="user-input">
        <label for="user-input">Per Gal.</label>
        <br><br>
        <div class="output-container">
            <p>Total:</p>
            <input type="text" placeholder="0.00" id="total-amount" readonly>
            <label for="total-amount">Dollars</label>
            <br><br>
            <p>Gas Amount:</p>
            <input type="text" placeholder="0.0000" id="gas-amount" readonly>
            <label for="total-amount"> Gallons</label>
        </div>
    </div>
    <!-- Footer container -->
    <div class="footer-container">
        <div class="inner-footer">
            <table>
                <tr>
                    <th colspan="2">
                        <h2>Created by Franklan Taylor @ 2026</h2>
                    </th>
                </tr>
                <tr>
                    <td>
                        <a href="https://github.com/franklant" target="_blank">
                            <img class="business-image" src="./images/github-logo.png" alt="Link to my Github.">
                        </a>
                    </td>
                    <td>
                        <a href="https://www.linkedin.com/in/franklant/" target="_blank">
                            <img class="business-image" src="./images/linkedin-logo.png" alt="Link to my LinkedIn.">
                        </a>
                    </td>
                </tr>
            </table>
        </div>
    </div>
</body>
<script src="./js/gasSimulation.js"></script>
</html>
